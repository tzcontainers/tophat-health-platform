services:
  postgres:
    image: postgres:17
    environment:
      POSTGRES_DB: tophat_health
      POSTGRES_USER: tophat
      POSTGRES_PASSWORD: tophat
    ports: [ "5432:5432" ]
    volumes: [ "postgres_data:/var/lib/postgresql/data" ]
  backend:
    build: { context: ./backend }
    depends_on: [ postgres ]
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/tophat_health
      SPRING_DATASOURCE_USERNAME: tophat
      SPRING_DATASOURCE_PASSWORD: tophat
      APP_STORAGE_LOCATION: /app/storage
      SERVER_PORT: 8080
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    ports: [ "8080:8080" ]
    volumes: [ "backend_storage:/app/storage" ]
  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_API_BASE_URL: http://backend:8080
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
    depends_on: [ backend ]
    environment:
      BACKEND_API_BASE_URL: http://backend:8080
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      NEXT_PUBLIC_DEFAULT_CANDIDATE_ID: 00000000-0000-0000-0000-000000000201
      NEXT_PUBLIC_DEFAULT_CLIENT_ID: 00000000-0000-0000-0000-000000000301
    ports: [ "3000:3000" ]
volumes:
  postgres_data:
  backend_storage:

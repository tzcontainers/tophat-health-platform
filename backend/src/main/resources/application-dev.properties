spring.application.name=tophat-health-backend
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/tophat_health}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:tophat}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:tophat}


spring.jpa.hibernate.show-sql=true
# spring.jpa.hibernate.format_sql=true
# spring.jpa.hibernate.highlight_sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

server.port=${SERVER_PORT:8080}

app.storage.location=${APP_STORAGE_LOCATION:./storage}
app.cors.allowed-origins=http://localhost:3000,http://frontend:3000
app.security.google.client-id=${GOOGLE_CLIENT_ID:}

name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_DB: tophat_health
          POSTGRES_USER: tophat
          POSTGRES_PASSWORD: tophat
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tophat -d tophat_health"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/tophat_health
      SPRING_DATASOURCE_USERNAME: tophat
      SPRING_DATASOURCE_PASSWORD: tophat
      APP_STORAGE_LOCATION: ./storage-ci
      BACKEND_API_BASE_URL: http://127.0.0.1:8080
      CI: true

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Backend tests
        working-directory: backend
        run: mvn test

      - name: Backend package
        working-directory: backend
        run: mvn -q -DskipTests package

      - name: Frontend lint
        working-directory: frontend
        run: npm run lint

      - name: Frontend build
        working-directory: frontend
        run: npm run build

      - name: Install Playwright browser
        working-directory: frontend
        run: npm run test:e2e:install

      - name: Playwright E2E
        working-directory: frontend
        run: npm run test:e2e

      - name: Docker Compose build
        run: docker compose build
